
name: Deploy Bicep

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: rg-bicep-demo
      LOCATION: eastus
      BICEP_FILE: storageaccount.bicep 
      VM_BICEP_FILE: bicep/vm.bicep
      VM_NAME: windowsVM

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Create Resource Group
      run: |
        az group create \
          --name $RESOURCE_GROUP \
          --location $LOCATION

    - name: Deploy Storage Account
      run: |
        az deployment group create \
          --resource-group $RESOURCE_GROUP \
          --template-file $BICEP_FILE

    - name: Deploy VM
      run: |
        az deployment group create \
          --resource-group $RESOURCE_GROUP \
          --template-file $VM_BICEP_FILE \
          --parameters \
            vmName=$VM_NAME \
            adminUsername=azureuser \
            adminPassword=${{ secrets.VM_PASSWORD }}

